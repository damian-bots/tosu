start_2 : "<b>हे</b> {0}, 🥀\n\n๏ यह {1} है !\n\n➻ एक तेज़ और शक्तिशाली टेलीग्राम संगीत प्लेयर बॉट जिसमें कुछ शानदार सुविधाएँ हैं।\n\n<b><u>समर्थित प्लेटफ़ॉर्म्स :</b></u> यूट्यूब, स्पॉटिफ़ाई, रेसो, एप्पल म्यूज़िक और साउंडक्लाउड।\n──────────────────\n<b>๏ मेरे मॉड्यूल्स और कमांड्स के बारे में जानकारी प्राप्त करने के लिए हेल्प बटन पर क्लिक करें।</b>"
start_3 : "नमस्ते {0}!\n\n{1} को <b>{2}</b> में जोड़ने के लिए धन्यवाद। मैं आपके ग्रुप में संगीत लाने के लिए तैयार हूँ।\n\nनीचे दिए बटन का उपयोग करें — त्वरित गाइड के लिए <b>सेटअप गाइड</b> दबाएँ या कभी भी भाषा बदलें।"
start_4 : "🎄 <b>सुपरग्रुप की आवश्यकता है</b> 🎄\n\nकृपया अपने <b>ग्रुप</b> को <b>सुपरग्रुप</b> में बदलें और फिर मुझे फिर से जोड़ें।\n\n<b>सुपरग्रुप कैसे बनाएं ?</b>\n- अपने ग्रुप की चैट इतिहास को <b>दृश्यमान</b> बनाएं।"
start_5 : "<b>↝ ब्लैकलिस्ट की गई चैट ↜</b>\n\nयह चैट {0} डेटाबेस पर ब्लैकलिस्ट है।\nअपनी चैट को अनब्लैकलिस्ट करने के लिए <a href={1}>सुडो उपयोगकर्ता</a> से अनुरोध करें या <a href={2}>समर्थन चैट पर जाएं।</a>"
start_6 : "😲 <b>ट्रैक जानकारी</b> 😲\n\n📌 <b>शीर्षक :</b> {0}\n\n⏳ <b>अवधि :</b> {1} मिनट\n👀 <b>दृश्य :</b> <code>{2}</code>\n⏰ <b>प्रकाशित हुआ :</b> {3}\n📎 <b>चैनल :</b> <a href={4}>{5}</a>\n\n<u><b>🥀 सर्च पावर्ड बाय {6}</b></u>"
guide_1 : "<b>📖 सेटअप गाइड</b>\n\n{0} को अपने ग्रुप में एक मिनट से कम समय में सेट करें:\n\n<b>स्टेप 1 — बॉट जोड़ें</b>\n<b>Add to Group</b> दबाएँ और अपना ग्रुप चुनें।\n\n<b>स्टेप 2 — बॉट को एडमिन बनाएं</b>\n{0} को एडमिन बनाएं और <b>Invite Users via Link</b> (यानी <b>Add Users</b>) परमिशन दें। वॉइस चैट के लिए ज़रूरी है।\n\n<b>स्टेप 3 — वॉइस चैट शुरू करें</b>\nग्रुप खोलें और वीडियो/वॉइस चैट शुरू करें।\n\n<b>स्टेप 4 — गाना चलाएं</b>\n<code>/play song name</code> या वीडियो के लिए <code>/vplay song name</code> इस्तेमाल करें।\n\nउदाहरण: <code>/play shape of you</code>\n\nबस इतना ही — संगीत का आनंद लें! 🎶"

