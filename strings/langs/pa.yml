start_1 : "{0} ਜੀ ਜਿੰਦਾ ਹੈ ਵੀ.\n\n<b>✫ ਅਪਟਾਈਮ :</b> {1}"
start_2 : "<b>ਹੇਲੋ</b> {0}, 🥀\n\n๏ ਇਹ {1} ਹੈ !\n\n➻ ਇੱਕ ਤੇਜ਼ ਅਤੇ ਤਾਕਤਵਰ ਟੈਲੀਗ੍ਰਾਮ ਸੰਗੀਤ ਪਲੇਅਰ ਬੋਟ ਜਿਸ ਵਿੱਚ ਕੁਝ ਸ਼ਾਨਦਾਰ ਵੈਬਸਾਇਟਾਂ ਹਨ।\n\n<b><u>ਸਮਰਥਿਤ ਪਲੈਟਫਾਰਮ :</b></u> ਯੂਟਿਊਬ, ਸਪੋਟੀਫਾਈ, ਰੈਸੋ, ਐਪਲ ਮਿਊਜ਼ਿਕ ਅਤੇ ਸਾਊਂਡਕਲੌਡ।\n──────────────────\n<b>๏ ਮੇਰੀ ਮੋਡਿਊਲਾਂ ਅਤੇ ਕੰਮਾਂ ਬਾਰੇ ਜਾਣਕਾਰੀ ਲਈ ਮੱਦਦ ਬਟਨ ਤੇ ਕਲਿਕ ਕਰੋ।</b>"
start_3 : "ਸਤ ਸ੍ਰੀ ਅਕਾਲ {0}!\n\n{1} ਨੂੰ <b>{2}</b> ਵਿੱਚ ਸ਼ਾਮਲ ਕਰਨ ਲਈ ਧੰਨਵਾਦ। ਮੈਂ ਤੁਹਾਡੇ ਗਰੁੱਪ ਵਿੱਚ ਸੰਗੀਤ ਲਿਆਉਣ ਲਈ ਤਿਆਰ ਹਾਂ।\n\nਹੇਠਾਂ ਦਿੱਤੇ ਬਟਨ ਵਰਤੋ — ਤੁਰੰਤ ਗਾਈਡ ਲਈ <b>ਸੈੱਟਅੱਪ ਗਾਈਡ</b> ਦਬਾਓ ਜਾਂ ਕਿਸੇ ਵੀ ਸਮੇਂ ਭਾਸ਼ਾ ਬਦਲੋ।"
start_4 : "🎄 <b>ਸੁਪਰਗਰੂਪ ਦੀ ਲੋੜ ਹੈ</b> 🎄\n\nਕਿਰਪਾ ਕਰਕੇ ਆਪਣੇ <b>ਗਰੁੱਪ</b> ਨੂੰ <b>ਸੁਪਰਗਰੂਪ</b> ਵਿੱਚ ਤਬਦੀਲ ਕਰੋ ਅਤੇ ਫਿਰ ਮੈਨੂੰ ਮੁੜ ਸ਼ਾਮਲ ਕਰੋ।\n\n<b>ਸੁਪਰਗਰੂਪ ਬਣਾਉਣ ਲਈ ਕਿਵੇਂ ?</b>\n- ਆਪਣੇ ਗਰੁੱਪ ਚੈਟ ਦੀ ਇਤਿਹਾਸ ਨੂੰ ਏਕ ਵਾਰ <b>ਦਿੱਖਤਾ</b> ਬਣਾਓ।"
start_5 : "<b>↝ ਬਲੈਕਲਿਸਟਡ ਚੈਟ ↜</b>\n\nਇਹ ਚੈਟ {0} ਡੇਟਾਬੇਸ 'ਤੇ ਬਲੈਕਲਿਸਟ ਹੈ।\nਤੁਹਾਨੂੰ ਕਿਸੇ ਦੂਜੇ <a href={1}>ਸੂਡੋ ਯੂਜ਼ਰ ਦੀ ਵੇਬਸਾਈਟ ਵੀਜ਼ਿਟ</a> ਕਰਨ ਲਈ ਅਨੁਰੋਧ ਕਰਦਾ ਹੈ, ਜਾਂ ਸੁਪੋਰਟ ਚੈਟ 'ਤੇ ਜਾਓ।"
start_6 : "😲 <b>ਟ੍ਰੈਕ ਜਾਣਕਾਰੀ</b> 😲\n\n📌 <b>ਸ਼ੀਰਸ਼ਕ :</b> {0}\n\n⏳ <b>ਮੁਦਤ :</b> {1} ਮਿੰਟ\n👀 <b>ਵੇਖੇ ਗਏ :</b> <code>{2}</code>\n⏰ <b>ਪ੍ਰਕਾਸ਼ਿਤ ਹੋਇਆ ਸਮਾਂ :</b> {3}\n📎 <b>ਚੈਨਲ :</b> <a href={4}>{5}</a>\n\n<u><b>🥀 ਖੋਜ ਸ਼ਕਤੀਵਾਨ ਬਣਾਇਆ ਗਿਆ ਹੈ {6}</b></u>"
guide_1 : "<b>📖 ਸੈੱਟਅੱਪ ਗਾਈਡ</b>\n\n{0} ਨੂੰ ਆਪਣੇ ਗਰੁੱਪ ਵਿੱਚ ਇੱਕ ਮਿੰਟ ਤੋਂ ਘੱਟ ਸਮੇਂ ਵਿੱਚ ਚਾਲੂ ਕਰੋ:\n\n<b>ਸਟੈਪ 1 — ਬੋਟ ਜੋੜੋ</b>\n<b>Add to Group</b> ਦਬਾਓ ਅਤੇ ਆਪਣਾ ਗਰੁੱਪ ਚੁਣੋ।\n\n<b>ਸਟੈਪ 2 — ਬੋਟ ਨੂੰ ਐਡਮਿਨ ਬਣਾਓ</b>\n{0} ਨੂੰ ਐਡਮਿਨ ਬਣਾਓ ਅਤੇ <b>Invite Users via Link</b> (ਯਾਨੀ <b>Add Users</b>) ਅਧਿਕਾਰ ਦਿਓ। ਵੌਇਸ ਚੈਟ ਲਈ ਜ਼ਰੂਰੀ ਹੈ।\n\n<b>ਸਟੈਪ 3 — ਵੌਇਸ ਚੈਟ ਸ਼ੁਰੂ ਕਰੋ</b>\nਗਰੁੱਪ ਖੋਲ੍ਹੋ ਅਤੇ ਵੀਡੀਓ/ਵੌਇਸ ਚੈਟ ਸ਼ੁਰੂ ਕਰੋ।\n\n<b>ਸਟੈਪ 4 — ਗੀਤ ਚਲਾਓ</b>\n<code>/play song name</code> ਜਾਂ ਵੀਡੀਓ ਲਈ <code>/vplay song name</code> ਵਰਤੋ।\n\nਉਦਾਹਰਨ: <code>/play shape of you</code>\n\nਇਹੀ ਹੈ — ਸੰਗੀਤ ਦਾ ਆਨੰਦ ਲਓ! 🎶"

help_1 : "ਸੰਮਰਥਨ ਲਈ ਕੈਟੇਗਰੀ ਚੁਣੋ ਜਿਸ ਵਿੱਚ ਤੁਸੀਂ ਮਦਦ ਪ੍ਰਾਪਤ ਕਰਨਾ ਚਾਹੁੰਦੇ ਹੋ। ਆਪਣੇ ਸਸਪੈਂਟ ਨੂੰ ਪੂਛੋ <a href={0}>ਸੰਮਰਥਨ ਚੈਟ</a>\n\nਸਭ ਕੰਮਾਂਡਾਂ <code>/</code> ਨਾਲ ਵਰਤੀ ਜਾ ਸਕਦੀਆਂ ਹਨ।"
