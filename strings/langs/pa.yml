owner_warn_flood : "<emoji id='5454225457916420314'>😖</emoji> <b>ਫਲੱਡਵੇਟ ਚੇਤਾਵਨੀ</b>\n\n<b>ਚੈਟ:</b> <code>{0}</code>\n<b>ਉਡੀਕ ਸਮਾਂ:</b> <b>{1}s</b>\n\nਗਰੁੱਪ ਕਾਲ ਵਿੱਚ ਸ਼ਾਮਲ ਹੁੰਦੇ ਸਮੇਂ ਅਸਿਸਟੈਂਟ ਨੂੰ ਫਲੱਡਵੇਟ ਦਾ ਸਾਹਮਣਾ ਹੋਇਆ। ਉਡੀਕ ਸਮਾਂ ਖਤਮ ਹੋਣ ਤੋਂ ਬਾਅਦ ਬੋਟ ਆਪਣੇ ਆਪ ਮੁੜ ਚਾਲੂ ਹੋ ਜਾਵੇਗਾ।"
