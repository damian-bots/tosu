call_11 : "<b>ਗਰੁੱਪ ਕਾਲ ਆਈਡੀ ਅਮਾਨਯੋਗ ਹੈ</b>\n\nਗਰੁੱਪ ਕਾਲ ਸੈਸ਼ਨ ਖਤਮ ਹੋ ਗਿਆ ਹੈ ਜਾਂ ਹੁਣ ਵੈਧ ਨਹੀਂ ਹੈ।\n\nਇਹ ਕਾਲ ਖਤਮ ਕਰੋ ਅਤੇ ਨਵੀਂ ਸ਼ੁਰੂ ਕਰੋ — ਫਿਰ ਸੰਗੀਤ ਦਾ ਆਨੰਦ ਲਓ।"
call_queue_end : "<b>ਕਿਊ ਖਤਮ ਹੋ ਗਈ</b>\n\nਕਿਊ ਵਿਚ ਆਖਰੀ ਟਰੈਕ ਡਾਊਨਲੋਡ ਨਹੀਂ ਹੋ ਸਕਿਆ। ਸਟ੍ਰੀਮ ਬੰਦ ਹੋ ਗਈ ਹੈ।\n\nਸੰਗੀਤ ਦੁਬਾਰਾ ਸ਼ੁਰੂ ਕਰਨ ਲਈ ਕੁਝ ਨਵਾਂ ਚਲਾਓ।"
