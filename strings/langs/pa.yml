call_channels_too_much : "<emoji id='5456517450034060547'>📛</emoji> <b>ਬਹੁਤ ਜ਼ਿਆਦਾ ਚੈਨਲ</b>\n\nਅਸਿਸਟੈਂਟ ਬਹੁਤ ਜ਼ਿਆਦਾ ਚੈਨਲਾਂ/ਗਰੁੱਪਾਂ ਵਿੱਚ ਸ਼ਾਮਲ ਹੋ ਗਿਆ ਹੈ (CHANNELS_TOO_MUCH)।\n\nਇਸਨੂੰ ਹੱਲ ਕਰਨ ਲਈ ਕਿਰਪਾ ਕਰਕੇ ਬੋਟ ਦੇ ਮਾਲਕ ਨਾਲ ਸੰਪਰਕ ਕਰੋ।"
call_flood_wait : "<emoji id='5850317551090800862'>⏰</emoji> <b>ਫਲੱਡ ਵੇਟ</b>\n\nਟੈਲੀਗ੍ਰਾਮ ਅਸਿਸਟੈਂਟ ਨੂੰ ਕਾਲ ਵਿੱਚ ਸ਼ਾਮਲ ਹੋਣ ਤੋਂ ਪਹਿਲਾਂ <b>{0} ਸਕਿੰਟ</b> ਉਡੀਕ ਕਰਨ ਲਈ ਕਹਿ ਰਿਹਾ ਹੈ।\n\nਕਿਰਪਾ ਕਰਕੇ ਕੁਝ ਸਮੇਂ ਬਾਅਦ ਦੁਬਾਰਾ ਕੋਸ਼ਿਸ਼ ਕਰੋ।"
call_frozen : "<emoji id='5431895003821513760'>❄️</emoji> <b>ਅਸਿਸਟੈਂਟ ਖਾਤਾ ਪ੍ਰਤੀਬੰਧਿਤ</b>\n\nਅਸਿਸਟੈਂਟ ਖਾਤਿਆਂ ਵਿੱਚੋਂ ਇੱਕ ਨੂੰ ਟੈਲੀਗ੍ਰਾਮ ਦੁਆਰਾ ਅਸਥਾਈ ਤੌਰ 'ਤੇ ਫ੍ਰੀਜ਼ ਕਰ ਦਿੱਤਾ ਗਿਆ ਹੈ (FROZEN_METHOD_INVALID)।\n\nਬੋਟ ਦੇ ਮਾਲਕ ਨੂੰ ਸੂਚਿਤ ਕਰ ਦਿੱਤਾ ਗਿਆ ਹੈ। ਕਿਰਪਾ ਕਰਕੇ ਬਾਅਦ ਵਿੱਚ ਦੁਬਾਰਾ ਕੋਸ਼ਿਸ਼ ਕਰੋ ਜਾਂ /reboot ਵਰਤੋ।"
