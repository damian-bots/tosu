setting_1 : "<u><b>{0} ਸੈਟਿੰਗਾਂ ਪੈਨਲ</b></u>\n\n<b>ਚੈਟ ਆਈਡੀ :</b> <code>{1}</code>\n<b>ਚੈਟ ਨਾਂ :</b> {2}\n\nਸੈਟਿੰਗਾਂ ਬਦਲਣ ਲਈ ਹੇਠਾਂ 'ਤੇ ਬਟਨਾਂ 'ਤੇ ਕਲਿਕ ਕਰੋ।"
